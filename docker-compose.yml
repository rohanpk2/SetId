services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wealthsplit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Interpolation uses the project `.env` file. Prefer DATABASE_URL_PROD, then
    # DATABASE_URL from that file, then the local compose `db` service.
    environment:
      DATABASE_URL: ${DATABASE_URL_PROD:-${DATABASE_URL:-postgresql://postgres:postgres@db:5432/wealthsplit}}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
